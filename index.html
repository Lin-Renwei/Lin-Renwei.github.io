<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的旅行记录</title>
  <style>
    :root {
      --ink: #1d2630;
      --muted: #6f7780;
      --blue: #0d4c7d;
      --soft-blue: #eaf5fb;
      --paper: #ffffff;
      --shadow: 0 22px 60px rgba(27, 50, 66, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: #f7fbfd;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    button {
      font: inherit;
      cursor: pointer;
    }

    .screen {
      display: none;
      min-height: 100vh;
      padding: 56px min(7vw, 92px);
    }

    .screen.active { display: block; }

    .hero {
      position: relative;
      min-height: 330px;
      margin: -56px min(-7vw, -92px) 0;
      padding: 88px min(7vw, 92px) 130px;
      color: #fff;
      background:
        linear-gradient(105deg, rgba(4, 37, 64, 0.88), rgba(4, 37, 64, 0.28)),
        url("https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&fit=crop&w=1800&q=85") center/cover;
      overflow: hidden;
    }

    .hero::after {
      position: absolute;
      right: -6vw;
      bottom: -1px;
      left: -6vw;
      height: 120px;
      content: "";
      background: #f7fbfd;
      clip-path: polygon(0 60%, 100% 0, 100% 100%, 0 100%);
    }

    .hero-text {
      position: relative;
      z-index: 1;
      max-width: 680px;
    }

    .hero-text p,
    .page-title p {
      margin: 0 0 12px;
      color: #9bd7f0;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .hero-text h1,
    .page-title h2 {
      margin: 0;
      font-size: clamp(36px, 7vw, 72px);
      line-height: 1.05;
    }

    .hero-text span,
    .page-title span {
      display: block;
      max-width: 620px;
      margin-top: 18px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 18px;
      line-height: 1.7;
    }

    .page-title {
      max-width: 820px;
      margin: 24px 0 40px;
    }

    .page-title p { color: var(--blue); }
    .page-title span { color: var(--muted); }

    .card-row {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: clamp(20px, 4vw, 56px);
      align-items: start;
      margin-top: -74px;
    }

    #placeCards { margin-top: 0; }

    .select-card {
      min-height: 420px;
      padding: 42px 34px;
      text-align: center;
      background: var(--paper);
      border: 0;
      border-radius: 26px;
      box-shadow: var(--shadow);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .select-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 30px 70px rgba(27, 50, 66, 0.2);
    }

    .select-card:nth-child(2) { margin-top: -64px; }
    .select-card:nth-child(3) { margin-top: -128px; }

    .avatar {
      width: 158px;
      height: 158px;
      margin: 0 auto 28px;
      border-radius: 50%;
      object-fit: cover;
    }

    .select-card h3 {
      margin: 0 0 14px;
      font-size: 26px;
    }

    .select-card p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .back-button {
      min-width: 92px;
      height: 42px;
      color: var(--blue);
      background: #fff;
      border: 1px solid #d5e7f0;
      border-radius: 999px;
      box-shadow: 0 10px 24px rgba(27, 50, 66, 0.08);
      font-weight: 800;
    }

    .photo-section,
    .node-card {
      max-width: 900px;
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 14px 36px rgba(27, 50, 66, 0.1);
    }

    .photo-section {
      margin-bottom: 24px;
      padding: 22px;
    }

    .photo-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .photo-head h3 {
      margin: 0;
      font-size: 22px;
    }

    .upload-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 104px;
      height: 38px;
      color: #fff;
      background: var(--blue);
      border-radius: 999px;
      font-weight: 800;
      cursor: pointer;
    }

    .upload-button input { display: none; }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .photo-card {
      position: relative;
      overflow: hidden;
      aspect-ratio: 1 / 1;
      margin: 0;
      background: var(--soft-blue);
      border-radius: 16px;
    }

    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-card button {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 30px;
      height: 30px;
      color: #fff;
      background: rgba(13, 76, 125, 0.82);
      border: 0;
      border-radius: 50%;
      font-weight: 900;
    }

    .photo-empty {
      grid-column: 1 / -1;
      padding: 26px;
      color: var(--muted);
      text-align: center;
      background: var(--soft-blue);
      border-radius: 16px;
    }

    .node-list {
      display: grid;
      gap: 16px;
      max-width: 900px;
    }

    .node-card {
      display: grid;
      grid-template-columns: 118px 1fr;
      gap: 18px;
      padding: 22px;
    }

    .node-card time {
      color: var(--blue);
      font-weight: 900;
    }

    .node-card h3 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .node-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
    }

    @media (max-width: 900px) {
      .card-row {
        grid-template-columns: 1fr;
        margin-top: -42px;
      }

      .select-card,
      .select-card:nth-child(2),
      .select-card:nth-child(3) {
        min-height: auto;
        margin-top: 0;
      }
    }

    @media (max-width: 620px) {
      .screen { padding: 34px 18px; }

      .hero {
        margin: -34px -18px 0;
        padding: 60px 18px 120px;
      }

      .select-card { padding: 30px 24px; }

      .avatar {
        width: 128px;
        height: 128px;
      }

      .node-card { grid-template-columns: 1fr; }
      .photo-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="screen active" id="tripScreen">
      <div class="hero">
        <div class="hero-text">
          <p>Travel Notes</p>
          <h1>我的旅行记录</h1>
          <span>选择一次旅程，进入地点列表</span>
        </div>
      </div>
      <div class="card-row" id="tripCards"></div>
    </section>

    <section class="screen" id="placeScreen">
      <button class="back-button" id="backToTrips" type="button">返回</button>
      <div class="page-title">
        <p id="placeDates"></p>
        <h2 id="placeTripTitle"></h2>
        <span>选择一个地点查看当地游玩内容</span>
      </div>
      <div class="card-row" id="placeCards"></div>
    </section>

    <section class="screen" id="nodeScreen">
      <button class="back-button" id="backToPlaces" type="button">返回</button>
      <div class="page-title">
        <p id="nodeTripTitle"></p>
        <h2 id="nodePlaceTitle"></h2>
        <span id="nodePlaceSummary"></span>
      </div>
      <section class="photo-section">
        <div class="photo-head">
          <h3>当地图片</h3>
          <label class="upload-button">
            上传图片
            <input id="photoInput" type="file" accept="image/*" multiple>
          </label>
        </div>
        <div class="photo-grid" id="photoGrid"></div>
      </section>
      <div class="node-list" id="nodeList"></div>
    </section>
  </main>

  <script>
    const trips = [
      {
        id: "wanggan",
        title: "皖赣四日自驾",
        dates: "3.27 - 3.30",
        desc: "武汉出发，经过天柱山、景德镇、南昌，最后返回中国地质大学。",
        image: "https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&fit=crop&w=600&q=85",
        places: [
          {
            id: "tianzhu",
            title: "天柱山",
            desc: "山景民宿、景区初游，适合放松和拍照。",
            image: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=600&q=85",
            nodes: [
              ["08:00", "武汉出发", "中国地质大学西区出发，走武黄高速、沪渝高速到潜山出口。"],
              ["11:00", "归云居民宿", "抵达民宿停车，找饭店、办理住宿。"],
              ["下午", "天柱山初游", "民宿在景区内，可先轻松逛一段路线。"]
            ]
          },
          {
            id: "jingdezhen",
            title: "景德镇",
            desc: "陶瓷博物馆、三宝村、陶溪川，陶瓷文化的一天。",
            image: "https://images.unsplash.com/photo-1523419409543-a5e549c1faa8?auto=format&fit=crop&w=600&q=85",
            nodes: [
              ["10:00", "景德镇中国陶瓷博物馆", "免费，提前两天预约。重点看元代青花瓷、釉里红和无语佛。"],
              ["13:30", "三宝国际陶艺村", "建议租共享电动车，逛三宝蓬艺术聚落、陶艺村博物馆。"],
              ["15:30", "陶艺体验", "可预约拉坯或彩绘体验，适合慢慢玩。"],
              ["18:30", "陶溪川文创街区", "老瓷厂改造街区，晚上灯光好看，晚餐去回家吃饭。"]
            ]
          },
          {
            id: "nanchang",
            title: "南昌",
            desc: "八一广场、珠宝街、万寿宫、滕王阁、秋水广场。",
            image: "https://images.unsplash.com/photo-1518005020951-eccb494ad742?auto=format&fit=crop&w=600&q=85",
            nodes: [
              ["10:30", "八一广场", "20 分钟左右，主要打卡拍照。"],
              ["11:00", "江西美术馆", "免费，提前公众号预约，带身份证。"],
              ["11:45", "珠宝街", "洪都大拇指、绿豆饼、瓦罐汤、拌粉。拥挤可转羊子巷。"],
              ["13:30", "万寿宫", "古风街区、糊羹、非遗店，步行游览比较方便。"],
              ["15:00", "滕王阁", "门票 50 元，学生半价。登 6 层看赣江。"],
              ["20:30", "秋水广场音乐喷泉", "周日 20:30 准时开始，西侧台阶视野好。"]
            ]
          }
        ]
      }
    ];

    let activeTrip = trips[0];
    let activePlace = activeTrip.places[0];
    let photos = loadPhotos();

    const screens = {
      trips: document.querySelector("#tripScreen"),
      places: document.querySelector("#placeScreen"),
      nodes: document.querySelector("#nodeScreen")
    };

    function showScreen(name) {
      Object.values(screens).forEach((screen) => screen.classList.remove("active"));
      screens[name].classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderTrips() {
      document.querySelector("#tripCards").innerHTML = trips.map((trip) => `
        <button class="select-card" type="button" data-trip="${trip.id}">
          <img class="avatar" src="${trip.image}" alt="${trip.title}">
          <h3>${trip.title}</h3>
          <p>${trip.dates}<br>${trip.desc}</p>
        </button>
      `).join("");
    }

    function renderPlaces() {
      document.querySelector("#placeTripTitle").textContent = activeTrip.title;
      document.querySelector("#placeDates").textContent = activeTrip.dates;
      document.querySelector("#placeCards").innerHTML = activeTrip.places.map((place) => `
        <button class="select-card" type="button" data-place="${place.id}">
          <img class="avatar" src="${place.image}" alt="${place.title}">
          <h3>${place.title}</h3>
          <p>${place.desc}</p>
        </button>
      `).join("");
    }

    function renderNodes() {
      document.querySelector("#nodeTripTitle").textContent = activeTrip.title;
      document.querySelector("#nodePlaceTitle").textContent = activePlace.title;
      document.querySelector("#nodePlaceSummary").textContent = activePlace.desc;
      renderPhotos();
      document.querySelector("#nodeList").innerHTML = activePlace.nodes.map((node) => `
        <article class="node-card">
          <time>${node[0]}</time>
          <div>
            <h3>${node[1]}</h3>
            <p>${node[2]}</p>
          </div>
        </article>
      `).join("");
    }

    function loadPhotos() {
      const saved = localStorage.getItem("travel-place-photos");
      if (!saved) return {};

      try {
        return JSON.parse(saved);
      } catch {
        return {};
      }
    }

    function savePhotos() {
      localStorage.setItem("travel-place-photos", JSON.stringify(photos));
    }

    function renderPhotos() {
      const placePhotos = photos[activePlace.id] || [];
      const photoGrid = document.querySelector("#photoGrid");

      if (!placePhotos.length) {
        photoGrid.innerHTML = '<div class="photo-empty">还没有上传这个地点的图片。</div>';
        return;
      }

      photoGrid.innerHTML = placePhotos.map((photo, index) => `
        <figure class="photo-card">
          <img src="${photo}" alt="${activePlace.title} 旅行图片">
          <button type="button" data-photo-index="${index}" aria-label="删除图片">×</button>
        </figure>
      `).join("");
    }

    document.querySelector("#tripCards").addEventListener("click", (event) => {
      const card = event.target.closest("[data-trip]");
      if (!card) return;
      activeTrip = trips.find((trip) => trip.id === card.dataset.trip);
      renderPlaces();
      showScreen("places");
    });

    document.querySelector("#placeCards").addEventListener("click", (event) => {
      const card = event.target.closest("[data-place]");
      if (!card) return;
      activePlace = activeTrip.places.find((place) => place.id === card.dataset.place);
      renderNodes();
      showScreen("nodes");
    });

    document.querySelector("#backToTrips").addEventListener("click", () => showScreen("trips"));
    document.querySelector("#backToPlaces").addEventListener("click", () => showScreen("places"));

    document.querySelector("#photoInput").addEventListener("change", async (event) => {
      const files = [...event.target.files].filter((file) => file.type.startsWith("image/"));
      if (!files.length) return;

      const encodedPhotos = await Promise.all(files.map(readImageFile));
      photos[activePlace.id] = [...(photos[activePlace.id] || []), ...encodedPhotos];
      savePhotos();
      renderPhotos();
      event.target.value = "";
    });

    document.querySelector("#photoGrid").addEventListener("click", (event) => {
      const button = event.target.closest("[data-photo-index]");
      if (!button) return;

      const index = Number(button.dataset.photoIndex);
      photos[activePlace.id].splice(index, 1);
      savePhotos();
      renderPhotos();
    });

    function readImageFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    renderTrips();
  </script>
</body>
</html>
