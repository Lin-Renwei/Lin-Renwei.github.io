<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行纪律记录</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="topbar">
      <div>
        <p class="eyebrow">Travel Log</p>
        <h1>旅行纪律记录</h1>
      </div>
      <button class="primary-button" id="addNodeTop" type="button">+ 新增节点</button>
    </section>

    <section class="summary-grid" aria-label="旅行统计">
      <div class="summary-item">
        <span class="summary-label">行程节点</span>
        <strong id="totalTrips">0</strong>
      </div>
      <div class="summary-item">
        <span class="summary-label">已完成</span>
        <strong id="doneTrips">0</strong>
      </div>
      <div class="summary-item">
        <span class="summary-label">最近目的地</span>
        <strong id="latestPlace">暂无</strong>
      </div>
    </section>

    <section class="composer" aria-label="新增行程">
      <div class="field-row">
        <label>
          行程名称
          <input id="tripTitle" type="text" placeholder="例如：杭州两日游">
        </label>
        <label>
          日期
          <input id="tripDate" type="date">
        </label>
      </div>
      <div class="field-row">
        <label>
          地点
          <input id="tripPlace" type="text" placeholder="例如：西湖、灵隐寺">
        </label>
        <label>
          状态
          <select id="tripStatus">
            <option value="planned">计划中</option>
            <option value="done">已完成</option>
            <option value="memory">值得回味</option>
          </select>
        </label>
      </div>
      <label>
        纪律 / 备注
        <textarea id="tripNote" rows="3" placeholder="记录预算、路线、打卡点、感受、下次要注意的事..."></textarea>
      </label>
      <button class="primary-button wide" id="addTrip" type="button">添加行程节点</button>
    </section>

    <section class="timeline-section">
      <div class="section-head">
        <h2>行程时间轴</h2>
        <button class="ghost-button" id="clearAll" type="button">清空记录</button>
      </div>
      <div class="timeline" id="timeline" aria-live="polite"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
